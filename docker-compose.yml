version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ml_backend_container
    ports:
      - "8765:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    container_name: web_frontend_container
    ports:
      - "8502:8501"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    environment:
      - PYTHONUNBUFFERED=1