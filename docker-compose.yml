version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ml_backend_container
    ports:
      - "8000:8000"  # ปรับเป็น 8000 มาตรฐาน
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    container_name: web_frontend_container
    ports:
      - "8501:8501"  # ปรับเป็น 8501 มาตรฐานของ Streamlit
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    environment:
      - PYTHONUNBUFFERED=1
